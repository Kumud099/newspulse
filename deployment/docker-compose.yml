services:
  backend:
    build:
      context: ..
      dockerfile: deployment/Dockerfile.backend

    working_dir: /app

    ports:
      - "8000:8000"

    depends_on:
      - postgres
      - redis

    env_file:
      - ../.env


    command: uv run uvicorn backend.app.main:app --host 0.0.0.0 --port 8000

    volumes:
      - ../backend:/app/backend

    restart: unless-stopped

  worker:
    build:
      context: ..
      dockerfile: deployment/Dockerfile.backend

    working_dir: /app

    depends_on:
      - postgres
      - redis

    env_file:
      - ../.env


    command: uv run celery -A backend.app.workers.celery_app worker --loglevel=info

    volumes:
      - ../backend:/app/backend

    restart: unless-stopped

  postgres:
    image: postgres:16

    ports:
      - "5431:5432"

    env_file:
      - ../.env


    volumes:
      - postgres_data:/var/lib/postgresql/data

    restart: unless-stopped

  redis:
    image: redis:7

    restart: unless-stopped

volumes:
  postgres_data: